<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Living Heritage Project Progress Log</title>
<style>
  :root{
    --teal:#0E5C55; --teal-dk:#0A403B; --teal-lt:#E9F2F0;
    --paper:#FBFAF6; --card:#FFFFFF; --ink:#23201C; --mute:#6A645B; --line:#E3DDD2;
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .page{max-width:840px;margin:0 auto;padding:clamp(24px,5vw,56px) clamp(16px,4vw,28px) 72px}

  /* header */
  header{border-bottom:3px solid var(--teal);padding-bottom:clamp(18px,4vw,26px);margin-bottom:clamp(22px,4vw,34px)}
  .eyebrow{font-size:clamp(.62rem,2.6vw,.72rem);font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:12px}
  h1{font-family:var(--serif);font-size:clamp(1.7rem,7vw,2.4rem);line-height:1.08;color:var(--teal);font-weight:700;letter-spacing:-.01em}
  .sub{font-family:var(--serif);font-size:clamp(1rem,3.6vw,1.15rem);color:var(--ink);margin-top:6px}
  .meta{margin-top:16px;font-size:clamp(.85rem,3.2vw,.92rem);color:var(--mute);display:flex;flex-direction:column;gap:4px}
  .meta b{color:var(--ink);font-weight:600}
  .updated{margin-top:12px;font-size:clamp(.72rem,2.8vw,.8rem);color:var(--teal-dk);font-weight:600}
  .intro{font-size:clamp(.9rem,3.4vw,.98rem);color:var(--mute);margin-bottom:clamp(22px,4vw,32px)}

  /* accordion entries */
  .entry{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 2px rgba(20,15,8,.03),0 6px 18px rgba(20,15,8,.04)}
  summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;
          padding:clamp(16px,4vw,20px) clamp(16px,4vw,26px);user-select:none;-webkit-tap-highlight-color:transparent}
  summary::-webkit-details-marker{display:none}
  summary:focus-visible{outline:3px solid rgba(14,92,85,.35);outline-offset:-3px;border-radius:8px}
  .head-text{display:flex;align-items:center;gap:10px 14px;flex-wrap:wrap;min-width:0}
  .date{flex:none;font-size:clamp(.66rem,2.7vw,.74rem);font-weight:700;letter-spacing:.06em;text-transform:uppercase;
        color:var(--teal);background:var(--teal-lt);padding:.42em .8em;border-radius:100px;white-space:nowrap}
  .entry-title{font-family:var(--serif);font-size:clamp(1.02rem,3.8vw,1.28rem);font-weight:700;color:var(--ink);line-height:1.25}
  .chev{flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:var(--teal);transition:transform .25s ease}
  .chev::before{content:"";width:9px;height:9px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:translateY(-2px) rotate(45deg)}
  details[open] .chev{transform:rotate(180deg)}
  summary:hover .entry-title{color:var(--teal-dk)}

  .panel{padding:0 clamp(16px,4vw,26px) clamp(18px,4vw,24px)}
  .panel .lead{color:var(--mute);font-size:clamp(.9rem,3.4vw,.98rem);margin:0 0 16px}
  .block{margin-top:16px}
  .block h3{font-size:clamp(.7rem,2.9vw,.78rem);font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--teal-dk);margin-bottom:9px}
  .block ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .block li{position:relative;padding-left:1.4em;font-size:clamp(.9rem,3.4vw,.95rem);color:var(--ink)}
  .block li::before{content:"";position:absolute;left:0;top:.55em;width:6px;height:6px;border-radius:50%;background:var(--teal)}
  .status{margin-top:20px;padding-top:14px;border-top:1px solid var(--line);font-size:clamp(.88rem,3.3vw,.92rem);color:var(--mute)}
  .status strong{color:var(--teal-dk)}

  .notice{background:var(--teal-lt);border:1px solid var(--line);border-radius:12px;padding:20px 22px;color:var(--teal-dk);font-size:.95rem}

  .proof{margin-top:18px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#0e0e10}
  .proof img{display:block;width:100%;height:auto}
  .proof figcaption{padding:10px 14px;font-size:clamp(.78rem,3vw,.85rem);color:var(--mute);border-top:1px solid var(--line);background:var(--card)}

  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);font-size:clamp(.72rem,2.8vw,.82rem);color:var(--mute);
         display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  @media (max-width:430px){
    .head-text{gap:8px}
    .entry-title{flex-basis:100%}
  }
  @media (prefers-reduced-motion:reduce){ .chev{transition:none} }
</style>
</head>
<body>
  <div class="page">
    <header>
      <div class="eyebrow" id="initiative"></div>
      <h1 id="title"></h1>
      <div class="sub" id="subtitle"></div>
      <div class="meta" id="meta"></div>
      <div class="updated" id="updated"></div>
    </header>
    <p class="intro" id="intro"></p>
    <div id="log"></div>
    <footer id="footer"></footer>
  </div>

  <script>
    function el(tag, cls, text){ const n=document.createElement(tag); if(cls)n.className=cls; if(text!=null)n.textContent=text; return n; }

    function renderHeader(d){
      document.getElementById('initiative').textContent = d.initiative || '';
      document.getElementById('title').textContent = d.project || 'Project Progress Log';
      document.getElementById('subtitle').textContent = d.subtitle || '';
      const meta = document.getElementById('meta');
      if(d.preparedBy){ const s=el('span'); s.append(el('b',null,'Prepared by '), document.createTextNode(d.preparedBy)); meta.appendChild(s); }
      if(d.preparedFor){ const s=el('span'); s.append(el('b',null,'For '), document.createTextNode(d.preparedFor)); meta.appendChild(s); }
      document.getElementById('intro').textContent = d.intro || '';
      const foot = document.getElementById('footer');
      foot.appendChild(el('span', null, (d.project||'') + ' ' + (d.subtitle||'')));
      foot.appendChild(el('span', null, d.initiative || ''));
    }

    function createEntry(entry, open){
      const det = el('details','entry'); if(open) det.open = true;
      const sum = el('summary');
      const head = el('span','head-text');
      head.appendChild(el('span','date', entry.dateLabel || entry.date || ''));
      head.appendChild(el('span','entry-title', entry.title || ''));
      sum.appendChild(head);
      sum.appendChild(el('span','chev'));
      det.appendChild(sum);

      const panel = el('div','panel');
      if(entry.summary) panel.appendChild(el('p','lead', entry.summary));
      (entry.sections || []).forEach(sec => {
        const blk = el('div','block');
        if(sec.heading) blk.appendChild(el('h3', null, sec.heading));
        const ul = el('ul');
        (sec.items || []).forEach(it => ul.appendChild(el('li', null, it)));
        blk.appendChild(ul);
        panel.appendChild(blk);
      });
      // Support a single image (entry.image/imageAlt/imageCaption) or many (entry.images[]).
      let shots = [];
      if(Array.isArray(entry.images)) shots = entry.images;
      else if(entry.image) shots = [{src:entry.image, alt:entry.imageAlt, caption:entry.imageCaption}];
      shots.forEach(shot => {
        if(!shot || !shot.src) return;
        const fig = el('figure','proof');
        const img = el('img');
        img.src = shot.src;
        img.alt = shot.alt || (entry.title || 'Progress screenshot');
        img.loading = 'lazy';
        fig.appendChild(img);
        if(shot.caption) fig.appendChild(el('figcaption', null, shot.caption));
        panel.appendChild(fig);
      });
      if(entry.status){
        const st = el('p','status');
        st.appendChild(el('strong', null, 'Status: '));
        st.appendChild(document.createTextNode(entry.status));
        panel.appendChild(st);
      }
      det.appendChild(panel);
      return det;
    }

    async function load(){
      const log = document.getElementById('log');
      let data;
      try{
        const res = await fetch('progress-log.json', {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
      }catch(err){
        log.appendChild(el('div','notice','Unable to load the progress data (progress-log.json). If you are viewing this page from a saved local file, please open it through the hosted project link instead, where the data file is served alongside it.'));
        return;
      }
      renderHeader(data);
      const entries = (data.entries || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
      if(entries.length){
        document.getElementById('updated').textContent = 'Last updated: ' + (entries[0].dateLabel || entries[0].date);
      }
      entries.forEach((entry, i) => log.appendChild(createEntry(entry, i === 0)));
    }

    load();
  </script>
</body>
</html>
